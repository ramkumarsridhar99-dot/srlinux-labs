name: master-lab

topology:
  nodes:
    srl1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
    srl2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
    srl3:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
    srl4:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
    srl5:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
    srl6:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest

  links:
    # OSPF Backbone (Area 0)
    - endpoints: ["srl2:e1-2", "srl3:e1-1"]   # srl2 <-> srl3 (Area 0)
    # Area 1
    - endpoints: ["srl4:e1-1", "srl2:e1-1"]   # srl4 <-> srl2 (Area 1)
    # Area 2
    - endpoints: ["srl5:e1-1", "srl3:e1-2"]   # srl5 <-> srl3 (Area 2)
    # Core router (iBGP) attached to Area 0
    - endpoints: ["srl1:e1-1", "srl2:e1-3"]   # srl1 <-> srl2 (Area 0)
    # eBGP to ISP
    - endpoints: ["srl1:e1-2", "srl6:e1-1"]   # srl1 <-> srl6 (eBGP)
